<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lista de Deseos & Billetera</title>
    <style>
        /* --- PALETA DE COLORES COQUETTE / MINIMALISTA --- */
        :root {
            --bg-color: #F7F4EF; /* Beige suave de fondo */
            --card-bg: #FFFFFF;
            --pink-pastel: #F3C1C1; /* Rosa pastel principal */
            --pink-hover: #EAA9A9;
            --pink-light: #FFF0F0; /* Fondo suave para los deseos */
            --text-main: #65534C; /* Marrón estético para el texto */
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: var(--text-main);
        }

        body {
            background-color: var(--bg-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #EAA9A9;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* --- BILLETERA (Actualizada a 4 columnas) --- */
        .wallet-card {
            background-color: var(--card-bg);
            border: 2px solid var(--pink-pastel);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(243, 193, 193, 0.25);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .wallet-card {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .wallet-item h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .wallet-item .amount {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .wallet-item input {
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            max-width: 130px;
            text-align: center;
            border: 1px dashed var(--pink-pastel);
            border-radius: 10px;
            background: var(--pink-light);
            outline: none;
            padding: 5px;
        }

        .negative {
            color: #D9534F !important;
        }

        /* --- PANEL DE AGREGAR PRODUCTOS --- */
        .panel {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(243, 193, 193, 0.3);
        }

        .wishlist-form {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .wishlist-form input[name="link"] {
            grid-column: span 3;
        }

        .wishlist-form button {
            grid-column: span 3;
        }

        input, select, button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #E5E0DA;
            background: #FDFCFB;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--pink-pastel);
            box-shadow: 0 0 5px rgba(243, 193, 193, 0.5);
        }

        button.btn-add {
            background-color: var(--pink-pastel);
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            color: white;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        button.btn-add:hover {
            background-color: var(--pink-hover);
        }

        /* --- LISTADO DE ARTÍCULOS --- */
        .wish-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wish-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: var(--pink-light);
            border-radius: 12px;
            gap: 15px;
            transition: opacity 0.2s;
        }

        .wish-item.bought {
            opacity: 0.4;
            background: #F2F1ED;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            accent-color: var(--pink-pastel);
            cursor: pointer;
        }

        .wish-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .wish-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .wish-price {
            font-size: 0.95rem;
            font-weight: 700;
            opacity: 0.9;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .badge.Urgente { background: #FFD2D2; color: #C94A4A; }
        .badge.Importante { background: #FFE8D1; color: #B36B22; }
        .badge.Capricho { background: #E2F0D9; color: #38761D; }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-link {
            text-decoration: none;
            font-size: 1.3rem;
            transition: transform 0.2s;
        }

        .btn-link:hover {
            transform: scale(1.1);
        }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-delete:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌸 Mi Lista de Deseos 🌸</h1>
        </header>

        <!-- BILLETERA EN PESO CHILENO -->
        <div class="wallet-card">
            <div class="wallet-item">
                <h3>💵 Mi Saldo Actual</h3>
                <div style="display: flex; align-items: center; justify-content: center; gap: 2px;">
                    <span>$</span>
                    <input type="number" id="balanceInput" value="100000" onchange="calculateWallet()">
                </div>
            </div>
            <div class="wallet-item">
                <h3>🔥 Total Urgentes</h3>
                <div class="amount" id="committedAmount">$0</div>
            </div>
            <div class="wallet-item">
                <h3>✨ Saldo Restante</h3>
                <div class="amount" id="remainingBalance">$100.000</div>
            </div>
            <div class="wallet-item">
                <h3>💰 Total de la Lista</h3>
                <div class="amount" id="totalWishlistAmount" style="color: #65534C;">$0</div>
            </div>
        </div>

        <!-- PANEL DE DESEOS -->
        <div class="panel">
            <div class="wishlist-form">
                <input type="text" id="wishTitle" placeholder="¿Qué quieres comprar? (Ej: Zapatos de fútbol Benja)">
                <input type="number" id="wishPrice" placeholder="Precio en CLP ($)">
                
                <select id="wishPriority">
                    <option value="Urgente">Urgente 🔥</option>
                    <option value="Importante">Importante ⚡</option>
                    <option value="Capricho">Capricho 🌸</option>
                </select>
                
                <input type="text" id="wishLink" placeholder="Link de AliExpress, Shein o tienda (opcional)">
                <button class="btn-add" onclick="addWishItem()">Añadir a mi Agenda</button>
            </div>

            <div class="wish-list" id="wishList">
                <!-- Ítems dinámicos aquí -->
            </div>
        </div>
    </div>

    <script>
        // Cargar datos locales del navegador
        let wishes = JSON.parse(localStorage.getItem('wishes_v3')) || [];
        document.getElementById('balanceInput').value = localStorage.getItem('userBalance_v3') || 100000;

        function saveToLocalStorage() {
            localStorage.setItem('wishes_v3', JSON.stringify(wishes));
            localStorage.setItem('userBalance_v3', document.getElementById('balanceInput').value);
        }

        // Formato de miles Chileno
        function formatCLP(value) {
            return Number(value).toLocaleString('es-CL');
        }

        function renderWishes() {
            const list = document.getElementById('wishList');
            list.innerHTML = '';
            
            wishes.forEach((wish, index) => {
                const div = document.createElement('div');
                div.className = `wish-item ${wish.bought ? 'bought' : ''}`;
                
                let linkBtn = wish.link ? `<a href="${wish.link}" target="_blank" class="btn-link" title="Ir a la tienda">🛒</a>` : '';
                
                div.innerHTML = `
                    <div class="checkbox-container">
                        <input type="checkbox" ${wish.bought ? 'checked' : ''} onclick="toggleWishBought(${index})">
                    </div>
                    <div class="wish-details">
                        <span class="wish-title">${wish.title}</span>
                        <span class="wish-price">$${formatCLP(wish.price)} CLP</span>
                    </div>
                    <span class="badge ${wish.priority}">${wish.priority}</span>
                    <div class="actions">
                        ${linkBtn}
                        <button class="btn-delete" onclick="deleteWish(${index})" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
            calculateWallet();
        }

        function addWishItem() {
            const title = document.getElementById('wishTitle').value;
            const price = document.getElementById('wishPrice').value;
            const priority = document.getElementById('wishPriority').value;
            const link = document.getElementById('wishLink').value;

            if (!title || !price) return alert("Por favor, escribe el nombre y el precio del deseo.");

            wishes.push({ title, price: Number(price), priority, link, bought: false });
            
            // Limpiar inputs
            document.getElementById('wishTitle').value = '';
            document.getElementById('wishPrice').value = '';
            document.getElementById('wishLink').value = '';

            saveToLocalStorage();
            renderWishes();
        }

        function toggleWishBought(index) {
            wishes[index].bought = !wishes[index].bought;
            saveToLocalStorage();
            renderWishes();
        }

        function deleteWish(index) {
            wishes.splice(index, 1);
            saveToLocalStorage();
            renderWishes();
        }

        function calculateWallet() {
            const balance = Number(document.getElementById('balanceInput').value);
            
            // 1. Sumar solo los pendientes marcados como "Urgente"
            const committed = wishes.reduce((sum, wish) => {
                if (wish.priority === 'Urgente' && !wish.bought) {
                    return sum + wish.price;
                }
                return sum;
            }, 0);

            // 2. Sumar ABSOLUTAMENTE TODO lo que no se ha comprado todavía (Meta de ahorro total)
            const totalWishlist = wishes.reduce((sum, wish) => {
                if (!wish.bought) {
                    return sum + wish.price;
                }
                return sum;
            }, 0);

            const remaining = balance - committed;

            // Mostrar montos formateados en la interfaz
            document.getElementById('committedAmount').innerText = `$${formatCLP(committed)}`;
            document.getElementById('totalWishlistAmount').innerText = `$${formatCLP(totalWishlist)}`;
            
            const remainingDiv = document.getElementById('remainingBalance');
            remainingDiv.innerText = `$${formatCLP(remaining)}`;

            if (remaining < 0) {
                remainingDiv.classList.add('negative');
            } else {
                remainingDiv.classList.remove('negative');
            }
            localStorage.setItem('userBalance_v3', balance);
        }

        // Carga inicial
        renderWishes();
    </script>
</body>
</html>
